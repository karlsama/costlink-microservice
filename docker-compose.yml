services:
  # ====================================================================
  # Nacos — host 网络模式，直连 Windows MySQL 127.0.0.1
  # ====================================================================
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: costlink-nacos
    network_mode: host
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: 127.0.0.1
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: nacos123
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    volumes:
      - nacos-logs:/home/nacos/logs

  # ====================================================================
  # Redis
  # ====================================================================
  redis:
    image: redis:7-alpine
    container_name: costlink-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - costlink-net

  # ====================================================================
  # RabbitMQ
  # ====================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: costlink-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-costlink}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-costlink123}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - costlink-net

  # ====================================================================
  # API 网关
  # ====================================================================
  costlink-gateway:
    build: ./costlink-gateway
    container_name: costlink-gateway
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848           # ← 容器里直接写 nacos
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      REDIS_HOST: redis
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - costlink-net

  # ====================================================================
  # 认证服务
  # ====================================================================
  costlink-auth:
    build: ./costlink-auth
    container_name: costlink-auth
    ports:
      - "8084:8084"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      DB_HOST: 10.166.141.207                 # ← MySQL 在 Windows 上
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - costlink-net

  # ====================================================================
  # 报销服务（核心）
  # ====================================================================
  costlink-reimbursement:
    build: ./costlink-reimbursement
    container_name: costlink-reimbursement
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      DB_HOST: 10.166.141.207
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-costlink}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-costlink123}
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - costlink-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ====================================================================
  # 预算服务（核心）
  # ====================================================================
  costlink-budget:
    build: ./costlink-budget
    container_name: costlink-budget
    ports:
      - "8082:8082"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      DB_HOST: 10.166.141.207
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - costlink-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ====================================================================
  # 审批服务（核心）
  # ====================================================================
  costlink-approval:
    build: ./costlink-approval
    container_name: costlink-approval
    ports:
      - "8083:8083"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      DB_HOST: 10.166.141.207
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-costlink}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-costlink123}
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - costlink-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ====================================================================
  # OCR 服务
  # ====================================================================
  costlink-ocr:
    build: ./costlink-ocr
    container_name: costlink-ocr
    ports:
      - "8085:8085"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      REDIS_HOST: redis
      BAIDU_OCR_APP_ID: ${BAIDU_OCR_APP_ID}
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY}
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - costlink-net

  # ====================================================================
  # 通知服务
  # ====================================================================
  costlink-notification:
    build: ./costlink-notification
    container_name: costlink-notification
    ports:
      - "8086:8086"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      DB_HOST: 10.166.141.207
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-costlink}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-costlink123}
    depends_on:
      nacos:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - costlink-net

  # ====================================================================
  # 报表服务
  # ====================================================================
  costlink-report:
    build: ./costlink-report
    container_name: costlink-report
    ports:
      - "8087:8087"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      DB_HOST: 10.166.141.207
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      nacos:
        condition: service_started
    networks:
      - costlink-net

  # ====================================================================
  # 前端
  # ====================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: costlink-nginx
    ports:
      - "80:80"
    volumes:
      - ./costlink-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - costlink-gateway
    networks:
      - costlink-net

networks:
  costlink-net:
    driver: bridge

volumes:
  nacos-logs:
  redis-data:
  rabbitmq-data:
